# For later use once Docker is available in this environment — not exercised during
# development (SQLite was used locally instead). See README's "Deploying" section for
# the SQLite -> PostgreSQL schema swap this compose file assumes has already been made.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindmap
      POSTGRES_PASSWORD: mindmap
      POSTGRES_DB: mindmap
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mindmap:mindmap@db:5432/mindmap
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in a .env file next to this compose file}
    ports:
      - "3000:3000"

volumes:
  db-data:
