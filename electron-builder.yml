appId: com.mindmap.app
productName: Mindmap
directories:
  output: release
files:
  - electron/**/*
  - package.json
# The standalone Next.js server (server.js + traced node_modules + .next/static +
# public — the same three-piece layout the Dockerfile assembles for
# `output: "standalone"`) is shipped as a single tar.gz, not a raw directory.
# electron-builder's extraResources copying special-cases any "node_modules"
# directory it finds (it's built for packaging an app's *own* dependencies, with its
# own pruning/dedup logic against the project's real node_modules) and silently
# strips the standalone build's self-contained copy as a "duplicate" — confirmed by
# packaging once and finding `Cannot find module 'next'` at runtime with the
# directory copied directly. A tar.gz is just an opaque resource file to it; the
# archive is extracted into userData on first launch instead (see electron/main.js).
extraResources:
  - from: .next/standalone.tar.gz
    to: standalone.tar.gz
  - from: prisma/local/template.db
    to: template.db
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  # No Apple Developer account for v1 — ship unsigned. Gatekeeper will warn on first
  # open (documented in the README); hardenedRuntime/notarization need a Developer ID
  # certificate to be worth enabling at all.
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  title: "Mindmap ${version}"
win:
  icon: assets/icon.ico
  # zip, not nsis: an NSIS installer needs Wine to build correctly from macOS/Linux,
  # and isn't required for a personal/free-tier app — the zip just needs unpacking
  # and Mindmap.exe run directly, no installer wizard or admin rights needed.
  target:
    - target: zip
      arch:
        - x64
