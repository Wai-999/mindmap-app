appId: com.mindmap.app
productName: Mindmap
directories:
  output: release
files:
  - electron/**/*
  - package.json
# No extraResources needed anymore — the app is a thin client that just loads the
# hosted deployment's URL (see electron/main.js), not a bundled Next.js server.
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  # No Apple Developer account for v1 — ship unsigned. Gatekeeper will warn on first
  # open (documented in the README); hardenedRuntime/notarization need a Developer ID
  # certificate to be worth enabling at all.
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  title: "Mindmap ${version}"
